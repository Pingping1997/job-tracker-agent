name: Job Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

jobs:
  track-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python src/main.py

      - name: Generate report
        run: python src/report.py

      - name: Commit database and reports
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/jobs.db reports/
          git commit -m "Update tracked jobs" || echo "No changes to commit"
          git push